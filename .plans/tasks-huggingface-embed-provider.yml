      `"huggingface" =>` arm to `resolve_api_key` that returns
      `HF_TOKEN` first, then `NEO4J_EMBED_API_KEY` fallback, both
      empty-string filtered (mirrors the existing `openai` arm).
    status: completed
    dependencies:
      - task-001
    acceptance_criteria:
      - "src/embed/mod.rs declares `pub mod huggingface;`"
      - "EmbedConfig::build matches \"huggingface\" → HuggingFace::new(...)"
      - "resolve_api_key(\"huggingface\") returns HF_TOKEN when set and non-empty"
      - "resolve_api_key(\"huggingface\") falls back to NEO4J_EMBED_API_KEY when HF_TOKEN is unset OR empty"
      - "resolve_api_key(\"huggingface\") returns None when neither is set/non-empty"
      - "cargo build clean"
    completed_at: 2026-04-20T10:05:00Z

