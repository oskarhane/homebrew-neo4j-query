tasks:
  - id: task-001
    title: "Implement HuggingFace provider in src/embed/huggingface.rs"
    description: |
      Create `src/embed/huggingface.rs` defining `HuggingFace { client,
      api_key, model, base_url: Option<String> }` and implementing
      `EmbedProvider`. Use `src/embed/ollama.rs` as the structural
      template; use bearer auth like `src/embed/openai.rs:50`. POST
      `{base}/{model}/pipeline/feature-extraction` when base_url is None
      (default `https://router.huggingface.co/hf-inference/models`); POST
      directly to `{base_url}` when overridden (dedicated endpoint). Body
      `{"inputs": text}`. Response parser must accept BOTH `[[f32, ...]]`
      (nested) and `[f32, ...]` (flat) shapes via `serde_json::Value`
      branching. Map errors per REQ-F-008 (auth, 404 with multilingual
      hint, generic non-2xx, connect/timeout, empty) using existing
      `EmbedError::ProviderError { provider: "huggingface", message }`.
    status: completed
    dependencies: []
    acceptance_criteria:
      - "src/embed/huggingface.rs compiles and exports HuggingFace struct"
      - "Default base URL is https://router.huggingface.co/hf-inference/models"
      - "When base_url is Some(_), no /{model}/pipeline/feature-extraction is appended"
      - "Response parser handles both [[f32]] and [f32] shapes; returns first vector"
      - "401/403 → 'huggingface auth failed: check HF_TOKEN scopes (needs Inference Providers permission)'"
      - "404 → contains both 'not deployed by any Inference Provider' and \"'<model>-multilingual-v1'\""
      - "No new EmbedError variants added; uses ProviderError + MissingApiKey"
    completed_at: 2026-04-20T09:53:32Z

