  - id: task-006
    title: "Implement Ollama embedding provider"
    description: |
      In `src/embed/ollama.rs`, implement the Ollama provider: POST
      `{base_url}/api/embed` (plural shape) with body `{model, input}`.
      Default base URL `http://localhost:11434`. No API key sent; if
      `NEO4J_EMBED_API_KEY` is set in env, silently ignore it.
