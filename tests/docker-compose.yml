services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/testpassword
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474/db/neo4j/query/v2 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
