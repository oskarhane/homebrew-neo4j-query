name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "neo4j:5"
            neo4j-image: neo4j:5
            cypher-default: ""
            expected-cypher-default: "5"
          - name: "neo4j:latest CYPHER_5"
            neo4j-image: neo4j:latest
            cypher-default: CYPHER_5
            expected-cypher-default: "5"
          - name: "neo4j:latest CYPHER_25"
            neo4j-image: neo4j:latest
            cypher-default: CYPHER_25
            expected-cypher-default: "25"

    name: test (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Start Neo4j
        run: |
          ENV_ARGS=(-e NEO4J_AUTH=neo4j/testpassword)
          if [ -n "${{ matrix.cypher-default }}" ]; then
            ENV_ARGS+=(-e NEO4J_db_query_default__language=${{ matrix.cypher-default }})
          fi
          docker run -d --name neo4j-test \
            -p 7474:7474 -p 7687:7687 \
            "${ENV_ARGS[@]}" \
            ${{ matrix.neo4j-image }}
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7474 >/dev/null 2>&1; then
              echo "Neo4j ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Neo4j failed to start"
          docker logs neo4j-test
          exit 1

      - name: Start Ollama
        run: |
          docker run -d --name ollama-test -p 11434:11434 ollama/ollama:0.5.4
          for i in $(seq 1 60); do
            if docker exec ollama-test ollama list >/dev/null 2>&1; then
              echo "Ollama ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Ollama failed to start"
          docker logs ollama-test
          exit 1

      - name: Pull all-minilm into Ollama
        run: docker exec ollama-test ollama pull all-minilm

      - name: Unit tests
        run: cargo test

      - name: Integration tests
        env:
          NEO4J_PASSWORD: testpassword
          EXPECTED_CYPHER_DEFAULT: ${{ matrix.expected-cypher-default }}
        run: cargo test -- --ignored
