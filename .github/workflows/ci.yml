name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/testpassword
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      ollama:
        image: ollama/ollama:0.5.4
        ports:
          - 11434:11434
        options: >-
          --health-cmd "ollama list >/dev/null 2>&1 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Pull all-minilm into Ollama
        run: docker exec ${{ job.services.ollama.id }} ollama pull all-minilm

      - name: Unit tests
        run: cargo test

      - name: Integration tests
        env:
          NEO4J_PASSWORD: testpassword
        run: cargo test -- --ignored
