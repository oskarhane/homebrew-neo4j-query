name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../neo4j-query-${{ matrix.target }}.tar.gz neo4j-query
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neo4j-query-${{ matrix.target }}
          path: neo4j-query-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz

  update-formula:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          SHA_DARWIN_ARM=$(shasum -a 256 artifacts/neo4j-query-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_DARWIN_X86=$(shasum -a 256 artifacts/neo4j-query-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM=$(shasum -a 256 artifacts/neo4j-query-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_LINUX_X86=$(shasum -a 256 artifacts/neo4j-query-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/neo4j-query.rb

          # Replace SHA256 placeholders in order of appearance
          python3 -c "
          import re
          with open('Formula/neo4j-query.rb') as f:
              content = f.read()

          shas = [
              '${SHA_DARWIN_ARM}',
              '${SHA_DARWIN_X86}',
              '${SHA_LINUX_ARM}',
              '${SHA_LINUX_X86}',
          ]
          i = 0
          def replace_sha(m):
              global i
              s = shas[i]
              i += 1
              return f'sha256 \"{s}\"'
          content = re.sub(r'sha256 \"[^\"]*\"', replace_sha, content, count=4)
          with open('Formula/neo4j-query.rb', 'w') as f:
              f.write(content)
          "

      - name: Commit and push formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/neo4j-query.rb
          git commit -m "update formula to ${GITHUB_REF_NAME}"
          git push
